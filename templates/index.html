<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Disease Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: #ffffff;
        }

        /* ── Header ── */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            font-size: 2rem;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #4ade80;
        }

        .header p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* ── Main Container ── */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ── Upload Card ── */
        .upload-card {
            background: rgba(255,255,255,0.07);
            border: 2px dashed rgba(74,222,128,0.4);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-card:hover {
            background: rgba(74,222,128,0.08);
            border-color: #4ade80;
            transform: translateY(-2px);
        }

        .upload-card.dragover {
            background: rgba(74,222,128,0.15);
            border-color: #4ade80;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .upload-card h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #e2e8f0;
        }

        .upload-card p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .btn-upload {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #000;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74,222,128,0.4);
        }

        #fileInput {
            display: none;
        }

        /* ── Preview ── */
        .preview-section {
            display: none;
            background: rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .preview-section img {
            max-width: 350px;
            max-height: 300px;
            border-radius: 15px;
            border: 2px solid rgba(74,222,128,0.3);
            object-fit: cover;
        }

        .preview-section h3 {
            margin-bottom: 15px;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .btn-predict {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff;
            border: none;
            padding: 14px 50px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-predict:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59,130,246,0.5);
        }

        .btn-predict:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Loading ── */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(74,222,128,0.2);
            border-top: 4px solid #4ade80;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Results ── */
        .results-section {
            display: none;
            margin-bottom: 30px;
        }

        .result-main {
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-healthy {
            background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(74,222,128,0.1));
            border: 2px solid rgba(74,222,128,0.4);
        }

        .result-diseased {
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(220,38,38,0.1));
            border: 2px solid rgba(239,68,68,0.4);
        }

        .result-emoji {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .result-status {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-crop {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .result-condition {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .confidence-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            height: 12px;
            margin: 10px auto;
            max-width: 400px;
            overflow: hidden;
        }

        .confidence-bar {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            transition: width 1s ease;
        }

        .confidence-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #4ade80;
            margin-top: 8px;
        }

        /* ── Top 3 ── */
        .top3-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
        }

        .top3-section h3 {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .top3-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-left: 3px solid #4ade80;
        }

        .top3-item:nth-child(2) { border-left-color: #3b82f6; }
        .top3-item:nth-child(3) { border-left-color: #a855f7; }

        .top3-name {
            font-size: 0.9rem;
            color: #e2e8f0;
        }

        .top3-conf {
            font-size: 0.9rem;
            font-weight: 600;
            color: #4ade80;
        }

        /* ── Reset Button ── */
        .btn-reset {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .btn-reset:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 30px;
            color: #475569;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-icon">🌿</div>
        <div>
            <h1>Crop Disease Detection System</h1>
        </div>
    </div>

    <div class="container">

        <!-- Upload Card -->
        <div class="upload-card" id="uploadCard">
            <div class="upload-icon">📸</div>
            <h2>Upload a Crop Leaf Image</h2>
            <p>Drag & drop your image here, or click to browse<br>
               Supports JPG, PNG, JPEG, WEBP</p>
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
                Choose Image
            </button>
            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp">
        </div>

        <!-- Preview Section -->
        <div class="preview-section" id="previewSection">
            <h3>📷 Selected Image</h3>
            <img id="previewImage" src="" alt="Preview">
            <br>
            <button class="btn-predict" id="predictBtn" onclick="predictDisease()">
                🔍 Detect Disease
            </button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color:#94a3b8;">Analysing your crop image...</p>
        </div>

        <!-- Results -->
        <div class="results-section" id="resultsSection">

            <!-- Main Result -->
            <div class="result-main" id="resultMain">
                <div class="result-emoji" id="resultEmoji"></div>
                <div class="result-status" id="resultStatus"></div>
                <div class="result-crop" id="resultCrop"></div>
                <div class="result-condition" id="resultCondition"></div>
                <div class="confidence-bar-container">
                    <div class="confidence-bar" id="confidenceBar" style="width:0%"></div>
                </div>
                <div class="confidence-text" id="confidenceText"></div>
            </div>

            <!-- Top 3 -->
            <div class="top3-section">
                <h3>🏆 Top 3 Predictions</h3>
                <div id="top3List"></div>
            </div>

            <br>
            <button class="btn-reset" onclick="resetApp()">
                🔄 Try Another Image
            </button>
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Crop Disease Detection System</p>
    </div>

    <script>
        const fileInput    = document.getElementById('fileInput');
        const uploadCard   = document.getElementById('uploadCard');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const loading      = document.getElementById('loading');
        const resultsSection = document.getElementById('resultsSection');

        // ── File Input Change ──
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) showPreview(file);
        });

        // ── Drag & Drop ──
        uploadCard.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadCard.classList.add('dragover');
        });

        uploadCard.addEventListener('dragleave', function() {
            uploadCard.classList.remove('dragover');
        });

        uploadCard.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadCard.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) showPreview(file);
        });

        // ── Show Preview ──
        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                uploadCard.style.display    = 'none';
                previewSection.style.display = 'block';
                resultsSection.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // ── Predict Disease ──
        async function predictDisease() {
            const file = fileInput.files[0];
            if (!file) return;

            // Show loading
            previewSection.style.display = 'none';
            loading.style.display        = 'block';
            resultsSection.style.display = 'none';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body  : formData
                });

                const data = await response.json();

                if (data.success) {
                    showResults(data);
                } else {
                    alert('Error: ' + data.error);
                    resetApp();
                }
            } catch (err) {
                alert('Something went wrong. Please try again.');
                resetApp();
            } finally {
                loading.style.display = 'none';
            }
        }

        // ── Show Results ──
        function showResults(data) {
            const top   = data.top_prediction;
            const mainDiv = document.getElementById('resultMain');

            // Set healthy/diseased style
            mainDiv.className = 'result-main ' +
                (top.is_healthy ? 'result-healthy' : 'result-diseased');

            document.getElementById('resultEmoji').textContent =
                top.is_healthy ? '✅' : '⚠️';

            document.getElementById('resultStatus').textContent =
                top.is_healthy ? 'HEALTHY CROP' : 'DISEASE DETECTED';

            document.getElementById('resultCrop').textContent =
                '🌱 Crop: ' + top.crop;

            document.getElementById('resultCondition').textContent =
                top.condition;

            // Confidence bar
            setTimeout(() => {
                document.getElementById('confidenceBar').style.width =
                    top.confidence + '%';
            }, 100);

            document.getElementById('confidenceText').textContent =
                'Confidence: ' + top.confidence + '%';

            // Top 3
            const top3List = document.getElementById('top3List');
            top3List.innerHTML = '';
            data.top3.forEach((item, i) => {
                top3List.innerHTML += `
                    <div class="top3-item">
                        <span class="top3-name">
                            ${i+1}. ${item.crop} — ${item.condition}
                        </span>
                        <span class="top3-conf">${item.confidence}%</span>
                    </div>
                `;
            });

            // Show results
            resultsSection.style.display = 'block';
        }

        // ── Reset ──
        function resetApp() {
            fileInput.value              = '';
            uploadCard.style.display     = 'block';
            previewSection.style.display = 'none';
            loading.style.display        = 'none';
            resultsSection.style.display = 'none';
            document.getElementById('confidenceBar').style.width = '0%';
        }
    </script>

</body>
</html>
